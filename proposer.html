<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Proposer votre bien — LOWI</title>
  <link rel="stylesheet" href="lowi-tokens.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */

    /* MAIN */
    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 7rem 1.5rem 3rem;
    }

    /* CARD */
    .card {
      background: var(--white);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow);
      padding: 2.8rem 2.5rem;
      width: 100%; max-width: 440px;
    }
    .card-title {
      font-size: 1.45rem; font-weight: 800; color: var(--ink);
      letter-spacing: -.03em; line-height: 1.2; margin-bottom: .5rem;
    }
    .card-sub {
      font-size: .92rem; color: var(--muted); line-height: 1.6; margin-bottom: 1.8rem;
    }

    /* SOCIAL BUTTONS */
    .social-btns { display: flex; flex-direction: column; gap: .75rem; margin-bottom: 1.4rem; }
    .btn-social {
      display: flex; align-items: center; justify-content: center; gap: .75rem;
      padding: .75rem 1.2rem; border-radius: .75rem; font-weight: 600; font-size: .95rem;
      border: 1.5px solid #E0E0E0; cursor: not-allowed; opacity: .72;
      text-decoration: none; transition: opacity .2s;
    }
    .btn-google { background: var(--white); color: #3C4043; }
    .btn-facebook { background: #1877F2; color: var(--white); border-color: #1877F2; }
    .btn-social svg { flex-shrink: 0; }

    /* DIVIDER */
    .divider {
      display: flex; align-items: center; gap: .75rem;
      color: var(--muted); font-size: .85rem; margin-bottom: 1.4rem;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #E5E7EB;
    }

    /* FORM */
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: .85rem; font-weight: 600; color: var(--ink2); margin-bottom: .4rem; }
    input {
      width: 100%; padding: .75rem 1rem; border: 1.5px solid #E0E0E0;
      border-radius: .75rem; font-size: .95rem; color: var(--ink);
      background: var(--white); transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: var(--gold); }

    /* ERROR */
    .error-msg {
      display: none; background: #FEF2F2; border: 1px solid #FECACA;
      color: #DC2626; border-radius: .6rem; padding: .65rem 1rem;
      font-size: .88rem; font-weight: 500; margin-bottom: 1rem;
    }
    .error-msg.visible { display: block; }

    /* SUBMIT */
    .btn-submit {
      width: 100%; padding: .9rem; background: var(--gold); color: var(--ink);
      border: none; border-radius: 2rem; font-weight: 800; font-size: 1rem;
      cursor: pointer; transition: background .2s, transform .15s; margin-top: .3rem;
    }
    .btn-submit:hover { background: var(--gold-lt); transform: translateY(-1px); }

    /* DEMO NOTICE */
    .demo-notice {
      text-align: center; margin-top: 1.4rem;
      font-size: .8rem; color: var(--muted);
      background: #F9FAFB; border-radius: .6rem; padding: .6rem;
    }
    .demo-notice code { font-family: monospace; color: var(--ink2); font-size: .82rem; }

    @media (max-width: 640px) {
      nav ul { display: none; }
      .card { padding: 2rem 1.4rem; }
    }
  </style>
</head>
<body>
<div id="halo"></div>

<script>
window.__NAV_RIGHT__ = `
  <button id="lang-btn" onclick="toggleLang()" class="nav-lang-btn">EN</button>
  <button class="nav-cta" id="nav-cta-btn" onclick="location.href='projets.html'">Commencer &agrave; investir</button>
`;
</script>
<script src="nav.js"></script>

<main>
  <div class="card">
    <h1 class="card-title" id="card-title">Proposez votre bien en Thaïlande</h1>
    <p class="card-sub" id="card-sub">Créez votre compte pour soumettre votre bien à l'équipe LOWI.</p>

    <div class="social-btns">
      <button class="btn-social btn-google" disabled title="Fonctionnalité désactivée en mode démo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.83z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.83c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
        </svg>
        <span id="btn-google-label">Continuer avec Google</span>
      </button>
      <button class="btn-social btn-facebook" disabled title="Fonctionnalité désactivée en mode démo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
        <span id="btn-fb-label">Continuer avec Facebook</span>
      </button>
    </div>

    <div class="divider" id="divider-text">— ou —</div>

    <div id="error-msg" class="error-msg" id="error-msg" role="alert"></div>

    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="username" id="label-username">Identifiant</label>
        <input type="text" id="username" name="username" value="John_Doe" autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password" id="label-password">Mot de passe</label>
        <input type="password" id="password" name="password" value="12345678" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-submit" id="btn-submit">Accéder à mon espace →</button>
    </form>

    <div class="demo-notice" id="demo-notice">
      Mode démo — utilisez <code>John_Doe</code> / <code>12345678</code>
    </div>
  </div>
</main>

<footer>
  <a href="index.html" class="logo">LOWI</a>
  <span id="footer-copy">© 2026 LOWI. Tous droits réservés.</span>
  <div>
    <a href="#" id="footer-legal">Mentions légales</a>
    <a href="#" id="footer-privacy">Politique de confidentialité</a>
    <a href="#" id="footer-contact">Contact</a>
  </div>
</footer>

<script>
(function () {
  var T = {
    fr: {
      navHow: 'Comment ça marche', navAbout: 'À propos', navProjects: 'Voir les propriétés',
      navPropose: 'Proposer votre bien', navProposeCta: 'Proposer votre bien', navCta: 'Commencer à investir',
      cardTitle: 'Proposez votre bien en Thaïlande',
      cardSub: 'Créez votre compte pour soumettre votre bien à l\'équipe LOWI.',
      btnGoogle: 'Continuer avec Google',
      btnFb: 'Continuer avec Facebook',
      divider: '— ou —',
      labelUsername: 'Identifiant',
      labelPassword: 'Mot de passe',
      btnSubmit: 'Accéder à mon espace →',
      errorMsg: 'Identifiants incorrects.',
      demoNotice: 'Mode démo — utilisez',
      footerCopy: '© 2026 LOWI. Tous droits réservés.',
      footerLegal: 'Mentions légales', footerPrivacy: 'Politique de confidentialité', footerContact: 'Contact'
    },
    en: {
      navHow: 'How it works', navAbout: 'About', navProjects: 'Properties',
      navPropose: 'List your property', navProposeCta: 'List your property', navCta: 'Start investing',
      cardTitle: 'List your property in Thailand',
      cardSub: 'Create your account to submit your property to the LOWI team.',
      btnGoogle: 'Continue with Google',
      btnFb: 'Continue with Facebook',
      divider: '— or —',
      labelUsername: 'Username',
      labelPassword: 'Password',
      btnSubmit: 'Access my space →',
      errorMsg: 'Incorrect credentials.',
      demoNotice: 'Demo mode — use',
      footerCopy: '© 2026 LOWI. All rights reserved.',
      footerLegal: 'Legal notice', footerPrivacy: 'Privacy policy', footerContact: 'Contact'
    },
    th: {
      navHow: 'วิธีการทำงาน', navAbout: 'เกี่ยวกับเรา', navProjects: 'ดูอสังหาริมทรัพย์', navPropose: 'เสนออสังหาริมทรัพย์', navProposeCta: 'เสนออสังหาริมทรัพย์', navCta: 'เริ่มลงทุน',
      cardTitle: 'เสนออสังหาริมทรัพย์ของคุณในประเทศไทย',
      cardSub: 'สร้างบัญชีเพื่อส่งอสังหาริมทรัพย์ของคุณให้ทีมงาน LOWI',
      btnGoogle: 'ดำเนินการต่อด้วย Google',
      btnFb: 'ดำเนินการต่อด้วย Facebook',
      divider: '— หรือ —',
      labelUsername: 'ชื่อผู้ใช้',
      labelPassword: 'รหัสผ่าน',
      btnSubmit: 'เข้าสู่พื้นที่ของฉัน →',
      errorMsg: 'ข้อมูลประจำตัวไม่ถูกต้อง',
      demoNotice: 'โหมดสาธิต — ใช้',
      footerCopy: '© 2026 LOWI. สงวนลิขสิทธิ์ทุกประการ',
      footerLegal: 'ข้อมูลทางกฎหมาย', footerPrivacy: 'นโยบายความเป็นส่วนตัว', footerContact: 'ติดต่อ'
    }
  };

  var currentLang = 'fr';

  function sel(id) { return document.getElementById(id); }

  function apply(l) {
    var t = T[l];
    document.documentElement.lang = l;
    sel('nav-how').innerHTML = t.navHow;
    sel('nav-about').innerHTML = t.navAbout;
    sel('nav-projects').innerHTML = t.navProjects;
    sel('nav-propose').innerHTML = t.navPropose;
    var npc = sel('nav-propose-cta'); if (npc) npc.innerHTML = t.navProposeCta;
    sel('nav-cta-btn').innerHTML = t.navCta;
    sel('card-title').innerHTML = t.cardTitle;
    sel('card-sub').innerHTML = t.cardSub;
    sel('btn-google-label').innerHTML = t.btnGoogle;
    sel('btn-fb-label').innerHTML = t.btnFb;
    sel('divider-text').innerHTML = t.divider;
    sel('label-username').innerHTML = t.labelUsername;
    sel('label-password').innerHTML = t.labelPassword;
    sel('btn-submit').innerHTML = t.btnSubmit;
    sel('footer-copy').innerHTML = t.footerCopy;
    sel('footer-legal').innerHTML = t.footerLegal;
    sel('footer-privacy').innerHTML = t.footerPrivacy;
    sel('footer-contact').innerHTML = t.footerContact;
    // Update demo notice
    sel('demo-notice').innerHTML = t.demoNotice + ' <code>John_Doe</code> / <code>12345678</code>';
    sel('lang-btn').textContent = {fr:'EN',en:'TH',th:'FR'}[l];
    localStorage.setItem('lowi-lang', l);
    currentLang = l;
  }

  window.toggleLang = function() { apply({fr:'en',en:'th',th:'fr'}[currentLang]); };

  window.handleLogin = function(e) {
    e.preventDefault();
    var username = sel('username').value.trim();
    var password = sel('password').value;
    var errEl = sel('error-msg');
    if (username === 'John_Doe' && password === '12345678') {
      errEl.classList.remove('visible');
      window.location.href = 'soumettre-bien.html';
    } else {
      errEl.textContent = T[currentLang].errorMsg;
      errEl.classList.add('visible');
    }
  };

  document.addEventListener('DOMContentLoaded', function() { apply(localStorage.getItem('lowi-lang') || 'fr'); });
})();
</script>
<script>
(function(){var h=document.getElementById('halo');function upd(){var p=Math.min(window.scrollY/(document.body.scrollHeight-window.innerHeight||1),1);h.style.left=(50+28*Math.sin(p*Math.PI*2.5))+'vw';h.style.top=(30+p*50)+'vh';}h.style.transition='none';upd();requestAnimationFrame(function(){h.style.transition='top 1s cubic-bezier(.25,.1,.25,1),left 1s cubic-bezier(.25,.1,.25,1)';});window.addEventListener('scroll',upd,{passive:true});window.addEventListener('resize',upd,{passive:true});})();
</script>
</body>
</html>
