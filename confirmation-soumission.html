<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dossier reçu — LOWI</title>
  <link rel="stylesheet" href="lowi-tokens.css">
  <style>
    :root {
      --green:   #16A34A;
      --green-lt:#DCFCE7;
    }
    body { min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */

    /* MAIN */
    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 7rem 1.5rem 3rem;
    }

    /* CARD */
    .card {
      background: var(--white); border-radius: var(--r-xl);
      box-shadow: var(--shadow);
      padding: 3.5rem 3rem; width: 100%; max-width: 520px;
      text-align: center;
    }

    /* CHECKMARK */
    .check-wrap {
      width: 80px; height: 80px; margin: 0 auto 1.8rem;
      background: var(--green-lt); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .check-wrap svg { width: 40px; height: 40px; }

    /* TITLE */
    .confirm-title {
      font-size: 1.65rem; font-weight: 800; color: var(--ink);
      letter-spacing: -.03em; line-height: 1.2; margin-bottom: .75rem;
    }
    .confirm-sub {
      font-size: .97rem; color: var(--muted); line-height: 1.7;
      margin-bottom: 1.5rem; max-width: 400px; margin-left: auto; margin-right: auto;
    }

    /* PROPERTY RECAP */
    .recap-pill {
      display: inline-flex; align-items: center; gap: .5rem;
      background: #F9FAFB; border: 1.5px solid #E5E7EB;
      border-radius: 2rem; padding: .5rem 1.2rem;
      font-size: .88rem; font-weight: 600; color: var(--ink2);
      margin-bottom: 2rem;
    }
    .recap-pill span.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); display: inline-block; flex-shrink: 0; }

    /* BUTTONS */
    .btn-group { display: flex; flex-direction: column; gap: .75rem; }

    @media (max-width: 640px) {
      nav ul { display: none; }
      .card { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>
<div id="halo"></div>

<script>
/* nav dropdown injected by nav.js */
</script>
<script src="nav.js"></script>

<main>
  <div class="card">
    <!-- Green checkmark -->
    <div class="check-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>

    <h1 class="confirm-title" id="confirm-title">Votre dossier a bien été reçu !</h1>
    <p class="confirm-sub" id="confirm-sub">Les équipes LOWI analyseront votre bien et vous contacteront sous 5 à 10 jours ouvrés.</p>

    <div class="recap-pill">
      <span class="dot"></span>
      <span id="recap-label">Bien soumis :</span>
      <strong id="recap-name">Chalok Baan Kao Pool Villa</strong>
    </div>

    <div class="btn-group">
      <a href="index.html" class="btn-gold" id="btn-home">Retour à l'accueil →</a>
      <a href="projets.html" class="btn-outline-ink" id="btn-projects">Voir nos projets →</a>
    </div>
  </div>
</main>

<footer>
  <a href="index.html" class="logo">LOWI</a>
  <span id="footer-copy">© 2026 LOWI. Tous droits réservés.</span>
  <div>
    <a href="#" id="footer-legal">Mentions légales</a>
    <a href="#" id="footer-privacy">Politique de confidentialité</a>
    <a href="#" id="footer-contact">Contact</a>
  </div>
</footer>

<script>
(function () {
  var T = {
    fr: {
      navHow: 'Comment ça marche', navAbout: 'À propos', navProjects: 'Voir les propriétés',
      navPropose: 'Proposer votre bien', navProposeCta: 'Proposer votre bien', navCta: 'Commencer à investir',
      confirmTitle: 'Votre dossier a bien été reçu !',
      confirmSub: 'Les équipes LOWI analyseront votre bien et vous contacteront sous 5 à 10 jours ouvrés.',
      recapLabel: 'Bien soumis :',
      recapName: 'Chalok Baan Kao Pool Villa',
      btnHome: "Retour à l'accueil →",
      btnProjects: 'Voir nos projets →',
      footerCopy: '© 2026 LOWI. Tous droits réservés.',
      footerLegal: 'Mentions légales', footerPrivacy: 'Politique de confidentialité', footerContact: 'Contact'
    },
    en: {
      navHow: 'How it works', navAbout: 'About', navProjects: 'Properties',
      navPropose: 'List your property', navProposeCta: 'List your property', navCta: 'Start investing',
      confirmTitle: 'Your submission has been received!',
      confirmSub: 'The LOWI team will review your property and contact you within 5 to 10 business days.',
      recapLabel: 'Property submitted:',
      recapName: 'Chalok Baan Kao Pool Villa',
      btnHome: 'Back to home →',
      btnProjects: 'View our projects →',
      footerCopy: '© 2026 LOWI. All rights reserved.',
      footerLegal: 'Legal notice', footerPrivacy: 'Privacy policy', footerContact: 'Contact'
    },
    th: {
      navHow: 'วิธีการทำงาน', navAbout: 'เกี่ยวกับเรา', navProjects: 'ดูอสังหาริมทรัพย์', navPropose: 'เสนออสังหาริมทรัพย์', navProposeCta: 'เสนออสังหาริมทรัพย์', navCta: 'เริ่มลงทุน',
      confirmTitle: 'เราได้รับข้อมูลของคุณแล้ว!',
      confirmSub: 'ทีมงาน LOWI จะตรวจสอบอสังหาริมทรัพย์ของคุณและติดต่อกลับภายใน 5 ถึง 10 วันทำการ',
      recapLabel: 'อสังหาริมทรัพย์ที่ส่ง:',
      recapName: 'Chalok Baan Kao Pool Villa',
      btnHome: 'กลับหน้าหลัก →',
      btnProjects: 'ดูโครงการของเรา →',
      footerCopy: '© 2026 LOWI. สงวนลิขสิทธิ์ทุกประการ',
      footerLegal: 'ข้อมูลทางกฎหมาย', footerPrivacy: 'นโยบายความเป็นส่วนตัว', footerContact: 'ติดต่อ'
    }
  };

  var currentLang = 'fr';
  function sel(id) { return document.getElementById(id); }

  function apply(l) {
    var t = T[l];
    document.documentElement.lang = l;
    sel('nav-how').innerHTML = t.navHow;
    sel('nav-about').innerHTML = t.navAbout;
    sel('nav-projects').innerHTML = t.navProjects;
    sel('nav-propose').innerHTML = t.navPropose;
    var npc = sel('nav-propose-cta'); if (npc) npc.innerHTML = t.navProposeCta;
    sel('nav-cta-btn').innerHTML = t.navCta;
    sel('confirm-title').innerHTML = t.confirmTitle;
    sel('confirm-sub').innerHTML = t.confirmSub;
    sel('recap-label').innerHTML = t.recapLabel;
    sel('recap-name').innerHTML = t.recapName;
    sel('btn-home').innerHTML = t.btnHome;
    sel('btn-projects').innerHTML = t.btnProjects;
    sel('footer-copy').innerHTML = t.footerCopy;
    sel('footer-legal').innerHTML = t.footerLegal;
    sel('footer-privacy').innerHTML = t.footerPrivacy;
    sel('footer-contact').innerHTML = t.footerContact;
    if (window.__updateLangDD__) window.__updateLangDD__(l);
    localStorage.setItem('lowi-lang', l);
    currentLang = l;
  }

  window.setLang = function(l) { apply(l); };
  document.addEventListener('DOMContentLoaded', function() { apply(localStorage.getItem('lowi-lang') || 'fr'); });
})();
</script>
<script>
(function(){var h=document.getElementById('halo');function upd(){var p=Math.min(window.scrollY/(document.body.scrollHeight-window.innerHeight||1),1);h.style.left=(50+28*Math.sin(p*Math.PI*2.5))+'vw';h.style.top=(30+p*50)+'vh';}h.style.transition='none';upd();requestAnimationFrame(function(){h.style.transition='top 1s cubic-bezier(.25,.1,.25,1),left 1s cubic-bezier(.25,.1,.25,1)';});window.addEventListener('scroll',upd,{passive:true});window.addEventListener('resize',upd,{passive:true});})();
</script>
</body>
</html>
